

services:
  elasticsearch:
    image: elasticsearch:8.10.2
    container_name: sdoqap-elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=sdoqap_secure
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:sdoqap_secure http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - sdoqap_network


  kibana:
    image: kibana:8.10.2
    container_name: sdoqap-kibana
    restart: always
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD:-sdoqap_secure}
    ports:
      - "${KIBANA_PORT}:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - sdoqap_network


  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: sdoqap-namenode
    restart: always
    environment:
      - CLUSTER_NAME=sdoqap_lake
      - ENSURE_NAMENODE_DIR=/hadoop/dfs/name
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - HDFS_CONF_dfs_replication=1
    env_file:
      - .env
    ports:
      - "9870:9870"
      - "9002:9000" # Map to 9002 to avoid conflict with other services (like MinIO) on 9000
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9870"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - sdoqap_network


  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: sdoqap-datanode
    restart: always
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - HDFS_CONF_dfs_replication=1
    env_file:
      - .env
    depends_on:
      - namenode
    volumes:
      - hadoop_datanode:/hadoop/dfs/data
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - sdoqap_network


  spark-master:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: sdoqap-spark-master
    restart: always
    env_file:
      - .env
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - ELASTICSEARCH_USER=${ELASTICSEARCH_USER:-elastic}
      - ELASTICSEARCH_PASSWORD=${ELASTICSEARCH_PASSWORD:-sdoqap_secure}
      - ELASTICSEARCH_HOST=${ELASTICSEARCH_HOST:-elasticsearch}
      - ELASTICSEARCH_PORT=${ELASTICSEARCH_PORT:-9200}
      - HADOOP_USER_NAME=root
    depends_on:
      namenode:
        condition: service_healthy
      datanode:
        condition: service_healthy

    ports:
      - "8081:8080" # Spark Web UI (map to 8081 to avoid conflict)
      - "7077:7077"
    healthcheck:
      test: ["CMD", "bash", "-c", "ps aux | grep -v grep | grep -q org.apache.spark.deploy.master.Master || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    volumes:
      - ./spark:/opt/spark-apps
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - sdoqap_network


  spark-worker:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: sdoqap-spark-worker
    restart: always
    env_file:
      - .env
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - ELASTICSEARCH_USER=${ELASTICSEARCH_USER:-elastic}
      - ELASTICSEARCH_PASSWORD=${ELASTICSEARCH_PASSWORD:-sdoqap_secure}
      - ELASTICSEARCH_HOST=${ELASTICSEARCH_HOST:-elasticsearch}
      - ELASTICSEARCH_PORT=${ELASTICSEARCH_PORT:-9200}
      - HADOOP_USER_NAME=root
    depends_on:
      spark-master:
        condition: service_healthy
      namenode:
        condition: service_healthy
    volumes:
      - ./spark:/opt/spark-apps
    deploy:
      resources:
        limits:
          memory: 1.5G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - sdoqap_network


  n8n:
    image: n8nio/n8n:latest
    container_name: sdoqap-n8n
    restart: always
    environment:
      - N8N_ENFORCE_SETTINGS_FILE_FOR_FILESYSTEM=false
      - N8N_RESTRICT_FILE_ACCESS_TO=/stress_test
    ports:
      - "${N8N_PORT}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./stress test:/stress_test
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - sdoqap_network


  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    ports:
      - "${API_PORT}:8000"
    # network_mode: host
    container_name: sdoqap-api

    restart: always
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_USER=${ELASTICSEARCH_USER:-elastic}
      - ELASTICSEARCH_PASSWORD=${ELASTICSEARCH_PASSWORD:-sdoqap_secure}
      - ELASTICSEARCH_HOST=${ELASTICSEARCH_HOST:-elasticsearch}
      - ELASTICSEARCH_PORT=${ELASTICSEARCH_PORT:-9200}
      - HOST=0.0.0.0
      - ELASTICSEARCH_URL=http://${ELASTICSEARCH_USER:-elastic}:${ELASTICSEARCH_PASSWORD:-sdoqap_secure}@${ELASTICSEARCH_HOST:-elasticsearch}:${ELASTICSEARCH_PORT:-9200}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SPARK_MASTER_HOST=${SPARK_MASTER_HOST:-spark-master}
      - SPARK_MASTER_PORT=${SPARK_MASTER_PORT:-7077}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - sdoqap_network

    deploy:
      resources:
        limits:
          memory: 512M




  grafana:
    image: grafana/grafana-oss:10.1.5
    container_name: sdoqap-grafana
    restart: always
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - sdoqap_network


  postgres:
    image: postgres:15-alpine
    container_name: sdoqap-postgres
    restart: always
    environment:
      - POSTGRES_USER=sdoqap
      - POSTGRES_PASSWORD=sdoqap
      - POSTGRES_DB=sdoqap_oltp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - sdoqap_network
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: sdoqap-ui
    restart: always
#   ports:  # Exposed via nginx reverse-proxy (removed direct mapping)
    depends_on:
      - api
    networks:
      - sdoqap_network

  nginx:
    image: nginx:alpine
    container_name: sdoqap-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - ui
    networks:
      - sdoqap_network



volumes:
  elasticsearch_data:
  hadoop_namenode:
  hadoop_datanode:
  n8n_data:
  postgres_data:

networks:
  sdoqap_network:
    driver: bridge
