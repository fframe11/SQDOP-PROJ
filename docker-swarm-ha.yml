version: '3.8'

services:
  elasticsearch:
    image: elasticsearch:8.10.2
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=sdoqap_secure
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:sdoqap_secure http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 2G
    networks:
      - sdoqap_network

  kibana:
    image: kibana:8.10.2
    restart: always
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "${KIBANA_PORT}:5601"
    depends_on:
      - elasticsearch
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 1G
    networks:
      - sdoqap_network

  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    restart: always
    environment:
      - CLUSTER_NAME=sdoqap_lake
      - ENSURE_NAMENODE_DIR=/hadoop/dfs/name
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    env_file:
      - .env
    ports:
      - "9870:9870"
      - "9002:9000"
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 1G
    networks:
      - sdoqap_network

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    restart: always
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    env_file:
      - .env
    depends_on:
      - namenode
    volumes:
      - hadoop_datanode:/hadoop/dfs/data
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 1G
    networks:
      - sdoqap_network

  spark-master:
    image: dataengproj-spark-master:latest
    restart: always
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
    ports:
      - "8081:8080"
      - "7077:7077"
    volumes:
      - spark_apps:/opt/spark-apps
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 1G
    networks:
      - sdoqap_network

  spark-worker:
    image: dataengproj-spark-worker:latest
    restart: always
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
    depends_on:
      - spark-master
    volumes:
      - spark_apps:/opt/spark-apps
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 3.5G
    networks:
      - sdoqap_network

  n8n:
    image: n8nio/n8n:latest
    restart: always
    environment:
      - N8N_ENFORCE_SETTINGS_FILE_FOR_FILESYSTEM=false
      - N8N_RESTRICT_FILE_ACCESS_TO=/stress_test
    ports:
      - "${N8N_PORT}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - stress_test:/stress_test
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1G
    networks:
      - sdoqap_network

  api:
    image: dataengproj-api:latest
    restart: always
    depends_on:
      - elasticsearch
    environment:
      - ELASTICSEARCH_URL=http://elastic:sdoqap_secure@elasticsearch:9200
    ports:
      - "${API_PORT}:8000"
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 512M
    networks:
      - sdoqap_network

  grafana:
    image: grafana/grafana-oss:10.1.5
    restart: always
    depends_on:
      - elasticsearch
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_provisioning:/etc/grafana/provisioning
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M
    networks:
      - sdoqap_network

  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=sdoqap
      - POSTGRES_PASSWORD=sdoqap
      - POSTGRES_DB=sdoqap_oltp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M
    networks:
      - sdoqap_network

  ui:
    image: dataengproj-ui:latest
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api
    deploy:
      replicas: 2
    networks:
      - sdoqap_network

volumes:
  elasticsearch_data:
  hadoop_namenode:
  hadoop_datanode:
  n8n_data:
  postgres_data:
  spark_apps:
  stress_test:
  grafana_provisioning:

networks:
  sdoqap_network:
    name: sdoqap_network
    driver: overlay
